<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusTube</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #121212;
      color: #ffffff;
      overflow-y: auto;
    }

    /* Header */
    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid #333333;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      color: #e3093a;
      letter-spacing: -0.3px;
    }

    /* Content wrapper */
    .content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Buttons */
    button {
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
      text-align: center;
    }

    .btn-primary {
      background: #e3093a;
      color: #ffffff;
    }
    .btn-primary:hover { background: #c80833; }

    .btn-outline {
      background: transparent;
      color: #ffffff;
      border: 1px solid #333333;
    }
    .btn-outline:hover { background: #1e1e1e; border-color: #555555; }

    .btn-yellow {
      background: #eab308;
      color: #000000;
      font-weight: 600;
    }
    .btn-yellow:hover { background: #ca9a07; }

    .btn-ghost {
      background: transparent;
      color: #b3b3b3;
      border: none;
      font-size: 13px;
      padding: 8px 16px;
    }
    .btn-ghost:hover { color: #ffffff; }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* User info row */
    .user-row {
      background: #1e1e1e;
      border: 1px solid #333333;
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .user-email {
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-plan {
      font-size: 12px;
      color: #b3b3b3;
    }

    .user-plan.pro  { color: #00bb13; }
    .user-plan.trial { color: #eab308; }

    /* Upgrade nudge banner (trial days 1, 2, 3, 4, 7 remaining) */
    .nudge-banner {
      background: rgba(234, 179, 8, 0.08);
      border: 1px solid rgba(234, 179, 8, 0.3);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nudge-copy {
      font-size: 13px;
      color: #eab308;
      line-height: 1.45;
    }

    .nudge-actions {
      display: flex;
      gap: 8px;
    }

    .nudge-actions .btn-yellow {
      flex: 1;
      padding: 8px 12px;
      font-size: 13px;
    }

    .nudge-actions .btn-ghost {
      flex: 0;
      padding: 8px 12px;
      font-size: 13px;
      width: auto;
    }

    /* Expired copy */
    .expired-heading {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.3;
    }

    .expired-stats {
      font-size: 13px;
      color: #b3b3b3;
      line-height: 1.5;
    }

    /* Welcome copy */
    .welcome-copy {
      font-size: 14px;
      color: #b3b3b3;
      line-height: 1.5;
    }

    /* Loading */
    #state-loading {
      padding: 28px 20px;
      font-size: 13px;
      color: #b3b3b3;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">FocusTube</div>
  </div>

  <!-- Loading -->
  <div id="state-loading" class="content">
    <span>Loading...</span>
  </div>

  <!-- State 1: Logged Out -->
  <div id="state-loggedout" class="content hidden">
    <p class="welcome-copy">
      Sign in or start your free trial to take back control over YouTube.
    </p>
    <button id="btn-signup" class="btn-primary">Start Free Trial</button>
    <button id="btn-signin" class="btn-outline">Sign In</button>
  </div>

  <!-- State 2: Trial -->
  <div id="state-trial" class="content hidden">
    <!-- Upgrade nudge — shown when 1, 2, 3, 4, or 7 days remaining -->
    <div id="upgrade-nudge" class="nudge-banner hidden">
      <p id="nudge-copy" class="nudge-copy"></p>
      <div class="nudge-actions">
        <button id="btn-nudge-upgrade" class="btn-yellow">Upgrade Now</button>
        <button id="btn-nudge-dismiss" class="btn-ghost">Dismiss</button>
      </div>
    </div>

    <div class="user-row">
      <div class="user-email" id="trial-email"></div>
      <div class="user-plan trial" id="trial-days"></div>
    </div>

    <button id="btn-trial-upgrade" class="btn-yellow">Upgrade to Pro</button>
    <button id="btn-trial-dashboard" class="btn-outline">View Dashboard</button>
    <button id="btn-trial-settings" class="btn-outline">Settings</button>
  </div>

  <!-- State 3: Pro -->
  <div id="state-pro" class="content hidden">
    <div class="user-row">
      <div class="user-email" id="pro-email"></div>
      <div class="user-plan pro">Pro plan &#10003;</div>
    </div>
    <button id="btn-pro-dashboard" class="btn-outline">View Dashboard</button>
    <button id="btn-pro-settings" class="btn-outline">Settings</button>
  </div>

  <!-- State 4: Expired -->
  <div id="state-expired" class="content hidden">
    <div class="expired-heading">Your 14-day trial has ended.</div>
    <div class="expired-stats" id="expired-stats"></div>
    <button id="btn-expired-upgrade" class="btn-primary">Upgrade to Pro &#8212; $5/month</button>
    <button id="btn-expired-uninstall" class="btn-ghost">No thanks, uninstall</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
